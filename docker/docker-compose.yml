version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: autoparts-db
    environment:
      POSTGRES_DB: autoparts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: autoparts123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoparts-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoparts-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: autoparts
      DB_USER: postgres
      DB_PASSWORD: autoparts123
      JWT_SECRET: ${JWT_SECRET:-autoparts-jwt-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - autoparts-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autoparts-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - autoparts-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: autoparts-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - autoparts-network

volumes:
  postgres_data:

networks:
  autoparts-network:
    driver: bridge
