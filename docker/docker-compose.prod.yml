version: '3.8'

services:
  # ===========================================
  # Database
  # ===========================================
  postgres:
    image: postgres:14-alpine
    container_name: autoparts-db
    environment:
      POSTGRES_DB: autoparts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Autoparts2024!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema-v3.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autoparts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoparts-network
    restart: unless-stopped

  # ===========================================
  # Redis (Cache + Session)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: autoparts-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - autoparts-network
    restart: unless-stopped

  # ===========================================
  # Search Engine (Meilisearch)
  # ===========================================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: autoparts-search
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-autoparts-master-key}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - autoparts-network
    restart: unless-stopped

  # ===========================================
  # Backend API
  # ===========================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: autoparts-api
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: autoparts
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-Autoparts2024!}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Meilisearch
      MEILI_HOST: meilisearch
      MEILI_PORT: 7700
      MEILI_KEY: ${MEILI_KEY:-autoparts-master-key}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      
      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      SITE_URL: ${SITE_URL:-https://autoparts.example.com}
      
      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      
      # AI (OpenAI)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - autoparts-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Frontend (Web)
  # ===========================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autoparts-web
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api/v1
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://autoparts.example.com}
      NEXT_PUBLIC_DEFAULT_LANGUAGE: en
      NEXT_PUBLIC_CURRENCY: USD
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - autoparts-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Admin Panel
  # ===========================================
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: autoparts-admin
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api/v1
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://autoparts.example.com}
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - autoparts-network
    restart: unless-stopped

  # ===========================================
  # Nginx (Reverse Proxy + SSL)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: autoparts-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - admin
    networks:
      - autoparts-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 1

  # ===========================================
  # Worker (Background Jobs)
  # ===========================================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    container_name: autoparts-worker
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: autoparts
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-Autoparts2024!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILI_HOST: meilisearch
      MEILI_PORT: 7700
      MEILI_KEY: ${MEILI_KEY:-autoparts-master-key}
    depends_on:
      - postgres
      - redis
      - meilisearch
    networks:
      - autoparts-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  autoparts-network:
    driver: bridge
